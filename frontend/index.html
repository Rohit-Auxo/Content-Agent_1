<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Generation Agent</title>
<style>
  :root {
    --bg: #f5f6f8;
    --panel-bg: #ffffff;
    --border: #e2e4e9;
    --text: #1b1e24;
    --text-dim: #6b7280;
    --accent: #4f46e5;
    --accent-dim: #eef0fe;
    --green: #16a34a;
    --amber: #d97706;
    --red: #dc2626;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }
  .app {
    display: grid;
    grid-template-columns: 270px 420px 1fr;
    height: 100vh;
  }
  .col {
    overflow-y: auto;
    padding: 16px;
  }
  .sidebar { background: var(--panel-bg); border-right: 1px solid var(--border); }
  .center { background: var(--bg); border-right: 1px solid var(--border); }
  .output { background: var(--bg); }

  h1 { font-size: 15px; margin: 0 0 12px; }
  h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-dim); margin: 0 0 8px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
  .tab-btn {
    flex: 1; padding: 8px 4px; border: none; background: none; cursor: pointer;
    font-size: 13px; color: var(--text-dim); border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .subtabs { display: flex; gap: 4px; margin-bottom: 10px; }
  .subtab-btn {
    padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--panel-bg); font-size: 11px; cursor: pointer; color: var(--text-dim);
  }
  .subtab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .history-item, .kb-item {
    padding: 8px 10px; border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 8px; cursor: pointer; font-size: 12px; background: var(--panel-bg);
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item .meta { color: var(--text-dim); font-size: 11px; margin-top: 2px; }
  .kb-item { cursor: default; position: relative; }
  .kb-item strong { display: block; font-size: 12px; margin-bottom: 3px; }
  .kb-item p { margin: 0; font-size: 11.5px; color: var(--text-dim); white-space: pre-wrap; }
  .kb-delete {
    position: absolute; top: 6px; right: 6px; border: none; background: none;
    color: var(--text-dim); cursor: pointer; font-size: 12px;
  }
  .kb-delete:hover { color: var(--red); }
  .kb-empty, .history-empty { color: var(--text-dim); font-size: 12px; padding: 8px 0; list-style: none; }

  .kb-form { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .kb-form input, .kb-form textarea, .kb-form select {
    width: 100%; margin-bottom: 6px; padding: 6px 8px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px; font-family: inherit; background: var(--panel-bg);
  }
  .kb-form textarea { min-height: 50px; resize: vertical; }
  .kb-upload-row { display: flex; gap: 6px; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
  .kb-upload-row input[type=file] { flex: 1; font-size: 11px; }
  .btn-small {
    padding: 5px 10px; border: 1px solid var(--accent); background: var(--accent-dim);
    color: var(--accent); border-radius: 6px; font-size: 11.5px; cursor: pointer; white-space: nowrap;
  }
  .btn-small:hover { background: var(--accent); color: #fff; }
  .kind-badge, .tier-badge {
    display: inline-block; font-size: 9.5px; padding: 1px 6px; border-radius: 999px;
    background: var(--accent-dim); color: var(--accent); font-weight: 600; margin-left: 6px;
  }
  .tier-badge { background: #f1f2f5; color: var(--text-dim); text-transform: capitalize; }
  .kb-select-list {
    max-height: 160px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 8px; background: var(--panel-bg);
  }
  .kb-select-row {
    display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 12px; cursor: pointer;
  }
  .kb-select-row span:first-of-type { flex: 1; }

  label { display: block; font-size: 12px; font-weight: 600; margin: 12px 0 5px; }
  select, input[type=text], textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: inherit; background: var(--panel-bg); color: var(--text);
  }
  textarea { min-height: 80px; resize: vertical; }

  .type-toggle { display: flex; gap: 8px; }
  .type-toggle button {
    flex: 1; padding: 8px; border: 1px solid var(--border); background: var(--panel-bg);
    border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-dim);
  }
  .type-toggle button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .pill {
    padding: 6px 12px; border: 1px solid var(--border); border-radius: 999px;
    background: var(--panel-bg); font-size: 12px; cursor: pointer; color: var(--text-dim);
  }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .run-btn {
    width: 100%; margin-top: 18px; padding: 12px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .run-btn:disabled { background: #a5a6f6; cursor: not-allowed; }

  .steps { margin-top: 20px; }
  .step-group-label {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
    color: var(--accent); margin: 12px 0 2px;
  }
  .step {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    font-size: 12.5px; color: var(--text-dim);
  }
  .step .dot {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px;
  }
  .step.active .dot { border-color: var(--accent); animation: pulse 1s infinite; }
  .step.active { color: var(--text); font-weight: 600; }
  .step.done .dot { border-color: var(--green); background: var(--green); color: #fff; }
  .step.done { color: var(--text); }
  .step.error .dot { border-color: var(--red); background: var(--red); color: #fff; }
  .step.error { color: var(--red); }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(79,70,229,.4); } 50% { box-shadow: 0 0 0 4px rgba(79,70,229,0); } }

  .error-banner {
    margin-top: 12px; padding: 10px 12px; background: #fef2f2; border: 1px solid #fecaca;
    color: var(--red); border-radius: 8px; font-size: 12.5px; display: none;
  }

  .variants-grid { display: flex; flex-direction: column; gap: 24px; }
  .variants-grid-inner { display: flex; flex-direction: column; gap: 14px; }
  .channel-section { display: flex; flex-direction: column; gap: 10px; }
  .channel-header {
    font-size: 13px; font-weight: 700; color: var(--accent); padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .hint { font-size: 11px; color: var(--text-dim); margin: -3px 0 6px; }
  .placeholder { color: var(--text-dim); font-size: 13px; padding: 40px 10px; text-align: center; }
  .variant-card {
    background: var(--panel-bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px; position: relative;
  }
  .variant-card.loading { opacity: .5; pointer-events: none; }
  .variant-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .variant-title { font-size: 13.5px; font-weight: 700; }
  .variant-actions { display: flex; gap: 6px; }
  .icon-btn {
    border: 1px solid var(--border); background: var(--panel-bg); border-radius: 6px;
    padding: 4px 9px; font-size: 11.5px; cursor: pointer; color: var(--text-dim);
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .variant-content {
    white-space: pre-wrap; font-size: 13px; line-height: 1.55; margin-bottom: 10px;
    max-height: 340px; overflow-y: auto; padding-right: 4px;
  }
  .scores-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .score-chip {
    font-size: 10.5px; padding: 3px 8px; border-radius: 999px; font-weight: 600;
    background: #f1f2f5; color: var(--text-dim);
  }
  .score-chip.good { background: #ecfdf3; color: var(--green); }
  .score-chip.mid { background: #fffaeb; color: var(--amber); }
  .score-chip.bad { background: #fef2f2; color: var(--red); }
  .critique-notes { font-size: 12px; color: var(--text-dim); font-style: italic; }
  .copied-toast {
    position: absolute; top: 12px; right: 100px; font-size: 11px; color: var(--green);
    opacity: 0; transition: opacity .3s;
  }
  .copied-toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- LEFT SIDEBAR -->
  <div class="col sidebar">
    <h1>Content Agent</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="history">History</button>
      <button class="tab-btn" data-tab="kb">Knowledge Base</button>
    </div>

    <div class="tab-pane active" id="tab-history">
      <div id="history-list"></div>
    </div>

    <div class="tab-pane" id="tab-kb">
      <div class="subtabs">
        <button class="subtab-btn active" data-tier="global">Global</button>
        <button class="subtab-btn" data-tier="client">Client</button>
        <button class="subtab-btn" data-tier="user">User</button>
      </div>
      <div class="kb-pane" id="kb-pane-global"><ul id="kb-list-global" style="list-style:none;padding:0;"></ul></div>
      <div class="kb-pane" id="kb-pane-client" style="display:none;">
        <ul id="kb-list-client" style="list-style:none;padding:0;"></ul>
        <div class="kb-form">
          <select id="kb-client-kind">
            <option value="general">General</option>
            <option value="citation">Citation</option>
            <option value="brand_guidelines">Brand Guidelines</option>
            <option value="tone_guidelines">Tone Guidelines</option>
          </select>
          <input type="text" id="kb-client-title" placeholder="Title">
          <textarea id="kb-client-content" placeholder="Content"></textarea>
          <button class="btn-small" onclick="addKBEntry('client')">Add Text Entry</button>
          <div class="kb-upload-row">
            <input type="file" id="kb-client-file" accept=".txt,.md,.pdf,.docx">
            <button class="btn-small" onclick="uploadKBEntry('client')">Upload File</button>
          </div>
        </div>
      </div>
      <div class="kb-pane" id="kb-pane-user" style="display:none;">
        <ul id="kb-list-user" style="list-style:none;padding:0;"></ul>
        <div class="kb-form">
          <select id="kb-user-kind">
            <option value="general">General</option>
            <option value="citation">Citation</option>
            <option value="brand_guidelines">Brand Guidelines</option>
            <option value="tone_guidelines">Tone Guidelines</option>
          </select>
          <input type="text" id="kb-user-title" placeholder="Title">
          <textarea id="kb-user-content" placeholder="Content"></textarea>
          <button class="btn-small" onclick="addKBEntry('user')">Add Text Entry</button>
          <div class="kb-upload-row">
            <input type="file" id="kb-user-file" accept=".txt,.md,.pdf,.docx">
            <button class="btn-small" onclick="uploadKBEntry('user')">Upload File</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER INPUT PANEL -->
  <div class="col center">
    <h2>New Generation</h2>

    <label>Persona Type</label>
    <div class="type-toggle">
      <button id="type-individual" class="active" onclick="setPersonaType('individual')">Individual</button>
      <button id="type-business" onclick="setPersonaType('business')">Business</button>
    </div>

    <label for="persona-select">Persona</label>
    <select id="persona-select"></select>

    <label for="audience-input">Audience</label>
    <input type="text" id="audience-input" placeholder="e.g. mid-market ops leaders">

    <label for="problem-input">Brief / Problem to Address</label>
    <textarea id="problem-input" placeholder="What is this content about?"></textarea>

    <label for="tone-select">Tone</label>
    <select id="tone-select">
      <option>Professional</option>
      <option>Conversational</option>
      <option>Bold &amp; Direct</option>
      <option>Empathetic</option>
      <option>Witty &amp; Playful</option>
      <option>Authoritative</option>
      <option>Inspirational</option>
      <option>Analytical</option>
    </select>

    <label>Platforms (select one or more)</label>
    <div class="pill-row" id="platform-pills"></div>

    <label>Any guideline docs you'd like to use?</label>
    <div class="hint">Select any citation, brand, or tone guideline docs from your Knowledge Base to ground this generation.</div>
    <div class="kb-select-list" id="kb-select-list"></div>

    <button class="run-btn" id="run-btn" onclick="runGeneration()">Generate</button>

    <div class="error-banner" id="error-banner"></div>

    <div class="steps" id="steps"></div>
  </div>

  <!-- RIGHT OUTPUT PANEL -->
  <div class="col output">
    <h2>Channels</h2>
    <div class="variants-grid" id="variants-grid">
      <div class="placeholder">Run a generation to see variants for each selected channel here.</div>
    </div>
  </div>

</div>

<script>
// Empty string = same origin as this page. The frontend is served by the
// same FastAPI app as the API, so this works both locally (uvicorn serves
// both) and once hosted (one Render service, one URL).
const API_BASE = '';
const ACCESS_KEY_STORAGE = 'cga_access_key';

// Several apiFetch calls can be in flight at once (personas/platforms/KB all
// load in parallel on page load). If more than one hits a 401 at the same
// time, only one prompt() should appear — everyone else waits on it instead
// of firing their own, otherwise concurrent calls can end up using different
// (or empty) keys.
let keyPromptInFlight = null;

async function promptForAccessKey() {
  if (keyPromptInFlight) return keyPromptInFlight;
  keyPromptInFlight = (async () => {
    const entered = prompt('This content agent requires an access key. Enter it:');
    const trimmed = entered ? entered.trim() : '';
    if (trimmed) localStorage.setItem(ACCESS_KEY_STORAGE, trimmed);
    keyPromptInFlight = null;
    return trimmed || null;
  })();
  return keyPromptInFlight;
}

async function apiFetch(path, options = {}) {
  const headers = { ...(options.headers || {}) };
  const storedKey = localStorage.getItem(ACCESS_KEY_STORAGE);
  if (storedKey) headers['X-Access-Key'] = storedKey;

  let res = await fetch(`${API_BASE}${path}`, { ...options, headers });

  if (res.status === 401) {
    const entered = await promptForAccessKey();
    if (entered) {
      headers['X-Access-Key'] = entered;
      res = await fetch(`${API_BASE}${path}`, { ...options, headers });
    }
  }

  return res;
}

const PLATFORM_STEPS = ['analyze', 'plan', 'generate'];
const STEP_LABELS = {
  kb_context: 'Build knowledge base context',
  analyze: 'Analyze brief',
  plan: 'Plan 2 variants',
  generate: 'Generate 2 variants',
};

const KIND_LABELS = {
  general: 'General',
  citation: 'Citation',
  brand_guidelines: 'Brand Guidelines',
  tone_guidelines: 'Tone Guidelines',
};

const state = {
  personas: {},
  platforms: {},
  personaType: 'individual',
  selectedPlatforms: new Set(),
  kb: [],
  selectedKb: new Set(),
  history: [],
  lastRequest: null,
  channels: {}, // platform -> { analysis, variants: { key: variant } }
};

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text !== undefined && text !== null) e.textContent = text;
  return e;
}

// ---------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------
async function init() {
  wireTabs();
  await Promise.all([loadPersonas(), loadPlatforms(), loadKB()]);
  loadHistory();
}

function wireTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
    });
  });
  document.querySelectorAll('.subtab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.subtab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.kb-pane').forEach(p => p.style.display = 'none');
      btn.classList.add('active');
      document.getElementById(`kb-pane-${btn.dataset.tier}`).style.display = 'block';
    });
  });
}

// ---------------------------------------------------------------------
// Personas / platforms
// ---------------------------------------------------------------------
async function loadPersonas() {
  const res = await apiFetch('/personas');
  state.personas = await res.json();
  renderPersonaOptions();
}

function renderPersonaOptions() {
  const select = document.getElementById('persona-select');
  select.innerHTML = '';
  Object.entries(state.personas)
    .filter(([, p]) => p.type === state.personaType)
    .forEach(([key, p]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = p.label;
      select.appendChild(opt);
    });
}

function setPersonaType(type) {
  state.personaType = type;
  document.getElementById('type-individual').classList.toggle('active', type === 'individual');
  document.getElementById('type-business').classList.toggle('active', type === 'business');
  renderPersonaOptions();
}

async function loadPlatforms() {
  const res = await apiFetch('/platforms');
  state.platforms = await res.json();
  const row = document.getElementById('platform-pills');
  row.innerHTML = '';
  Object.entries(state.platforms).forEach(([key, p], i) => {
    const pill = el('button', 'pill', p.label);
    pill.dataset.platform = key;
    if (i === 0) { pill.classList.add('active'); state.selectedPlatforms.add(key); }
    pill.addEventListener('click', () => {
      pill.classList.toggle('active');
      if (pill.classList.contains('active')) state.selectedPlatforms.add(key);
      else state.selectedPlatforms.delete(key);
    });
    row.appendChild(pill);
  });
}

// ---------------------------------------------------------------------
// Status steps (dynamic — one KB-context row, then a group per platform)
// ---------------------------------------------------------------------
function stepRowId(step, platform) {
  return `step-${step}-${platform || 'global'}`;
}

function buildStepRow(step, platform) {
  const row = el('div', 'step');
  row.id = stepRowId(step, platform);
  row.appendChild(el('span', 'dot', ''));
  row.appendChild(el('span', null, STEP_LABELS[step]));
  return row;
}

function buildSteps(platforms) {
  const box = document.getElementById('steps');
  box.innerHTML = '';
  box.appendChild(buildStepRow('kb_context', null));
  platforms.forEach(p => {
    box.appendChild(el('div', 'step-group-label', state.platforms[p]?.label || p));
    PLATFORM_STEPS.forEach(step => box.appendChild(buildStepRow(step, p)));
  });
  hideError();
}

function markAllStepsDone() {
  document.querySelectorAll('#steps .step').forEach(row => {
    row.classList.remove('active', 'error');
    row.classList.add('done');
    row.querySelector('.dot').textContent = '✓';
  });
}

function setStepStatus(step, platform, status) {
  const row = document.getElementById(stepRowId(step, platform));
  if (!row) return;
  row.classList.remove('active', 'done', 'error');
  const dot = row.querySelector('.dot');
  if (status === 'start') { row.classList.add('active'); dot.textContent = ''; }
  else if (status === 'done') { row.classList.add('done'); dot.textContent = '✓'; }
  else if (status === 'error') { row.classList.add('error'); dot.textContent = '!'; }
}

function showError(message) {
  const banner = document.getElementById('error-banner');
  banner.textContent = message;
  banner.style.display = 'block';
}

function hideError() {
  const banner = document.getElementById('error-banner');
  banner.style.display = 'none';
  banner.textContent = '';
}

// ---------------------------------------------------------------------
// Generation
// ---------------------------------------------------------------------
async function runGeneration() {
  const audience = document.getElementById('audience-input').value.trim();
  const problem = document.getElementById('problem-input').value.trim();
  const tone = document.getElementById('tone-select').value;
  const persona = document.getElementById('persona-select').value;
  const platforms = Array.from(state.selectedPlatforms);

  if (!audience || !problem || !persona || !platforms.length) {
    showError('Please fill in persona, audience, problem, and at least one platform before running.');
    return;
  }

  const payload = {
    persona,
    persona_type: state.personaType,
    audience,
    problem,
    tone,
    platforms,
    kb_ids: Array.from(state.selectedKb),
  };

  buildSteps(platforms);
  setRunning(true);
  document.getElementById('variants-grid').innerHTML = '';

  try {
    const res = await apiFetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.trim()) continue;
        handleEvent(JSON.parse(line), payload);
      }
    }
  } catch (err) {
    showError(err.message);
  } finally {
    setRunning(false);
  }
}

function setRunning(running) {
  document.getElementById('run-btn').disabled = running;
  document.getElementById('run-btn').textContent = running ? 'Generating…' : 'Generate';
}

function handleEvent(evt, request) {
  if (evt.step === 'error') {
    showError(evt.data || 'Generation failed.');
    return;
  }
  if (evt.step === 'complete') {
    markAllStepsDone();
    const response = evt.data;
    state.lastRequest = request;
    state.channels = {};
    response.channels.forEach(ch => {
      const variants = {};
      ch.variants.forEach(v => { variants[v.key] = v; });
      state.channels[ch.platform] = { analysis: ch.analysis, variants };
    });
    renderChannels();
    saveHistory(request, response);
    return;
  }
  setStepStatus(evt.step, evt.platform, evt.status);
}

// ---------------------------------------------------------------------
// Variant rendering
// ---------------------------------------------------------------------
function scoreClass(value) {
  if (value >= 80) return 'good';
  if (value >= 60) return 'mid';
  return 'bad';
}

function renderChannels() {
  const grid = document.getElementById('variants-grid');
  grid.innerHTML = '';
  Object.entries(state.channels).forEach(([platform, data]) => {
    const section = el('div', 'channel-section');
    section.appendChild(el('div', 'channel-header', state.platforms[platform]?.label || platform));
    const cardsWrap = el('div', 'variants-grid-inner');
    Object.values(data.variants).forEach(v => cardsWrap.appendChild(buildVariantCard(v, platform)));
    section.appendChild(cardsWrap);
    grid.appendChild(section);
  });
}

function buildVariantCard(variant, platform) {
  const card = el('div', 'variant-card');
  card.dataset.variant = variant.key;
  card.dataset.platform = platform;

  const header = el('div', 'variant-header');
  header.appendChild(el('div', 'variant-title', variant.label));
  const actions = el('div', 'variant-actions');
  const copyBtn = el('button', 'icon-btn', 'Copy');
  copyBtn.addEventListener('click', () => copyVariant(platform, variant.key));
  const regenBtn = el('button', 'icon-btn', 'Regen');
  regenBtn.addEventListener('click', () => regenVariant(platform, variant.key));
  const reviewBtn = el('button', 'icon-btn', 'Review');
  reviewBtn.addEventListener('click', () => reviewVariant(platform, variant.key));
  actions.appendChild(copyBtn);
  actions.appendChild(regenBtn);
  actions.appendChild(reviewBtn);
  header.appendChild(actions);
  card.appendChild(header);

  const toast = el('span', 'copied-toast', 'Copied!');
  toast.id = `toast-${platform}-${variant.key}`;
  card.appendChild(toast);

  card.appendChild(el('div', 'variant-content', variant.content));

  if (variant.scores) {
    const row = el('div', 'scores-row');
    const dims = ['hook_strength', 'authenticity', 'clarity', 'platform_fit', 'cta_strength', 'overall'];
    const labels = { hook_strength: 'Hook', authenticity: 'Authentic', clarity: 'Clarity', platform_fit: 'Fit', cta_strength: 'CTA', overall: 'Overall' };
    dims.forEach(d => {
      const value = variant.scores[d] ?? 0;
      const chip = el('span', `score-chip ${scoreClass(value)}`, `${labels[d]} ${value}`);
      row.appendChild(chip);
    });
    card.appendChild(row);
  }

  if (variant.critique_notes) {
    card.appendChild(el('div', 'critique-notes', variant.critique_notes));
  }

  return card;
}

async function copyVariant(platform, key) {
  const variant = state.channels[platform]?.variants[key];
  if (!variant) return;
  try {
    await navigator.clipboard.writeText(variant.content);
    const toast = document.getElementById(`toast-${platform}-${key}`);
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1200);
  } catch (err) {
    showError('Could not copy to clipboard.');
  }
}

async function regenVariant(platform, key) {
  const channel = state.channels[platform];
  if (!state.lastRequest || !channel) {
    showError('Run a full generation first.');
    return;
  }
  const card = document.querySelector(`[data-platform="${platform}"][data-variant="${key}"]`);
  if (card) card.classList.add('loading');
  try {
    const payload = {
      variant_key: key,
      persona: state.lastRequest.persona,
      persona_type: state.lastRequest.persona_type,
      audience: state.lastRequest.audience,
      problem: state.lastRequest.problem,
      tone: state.lastRequest.tone,
      platform,
      analysis: channel.analysis,
      kb_ids: state.lastRequest.kb_ids || [],
    };
    const res = await apiFetch('/regen', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const variant = await res.json();
    channel.variants[key] = variant;
    renderChannels();
  } catch (err) {
    showError(err.message);
  } finally {
    if (card) card.classList.remove('loading');
  }
}

async function reviewVariant(platform, key) {
  const channel = state.channels[platform];
  const variant = channel?.variants[key];
  if (!state.lastRequest || !variant) {
    showError('Run a full generation first.');
    return;
  }
  const card = document.querySelector(`[data-platform="${platform}"][data-variant="${key}"]`);
  if (card) card.classList.add('loading');
  try {
    const payload = {
      variant_key: key,
      persona: state.lastRequest.persona,
      platform,
      content: variant.content,
    };
    const res = await apiFetch('/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const result = await res.json();
    variant.scores = result.scores;
    variant.critique_notes = result.critique_notes;
    renderChannels();
  } catch (err) {
    showError(err.message);
  } finally {
    if (card) card.classList.remove('loading');
  }
}

// ---------------------------------------------------------------------
// History (localStorage)
// ---------------------------------------------------------------------
const HISTORY_KEY = 'cga_history';
const HISTORY_LIMIT = 20;

function saveHistory(request, response) {
  const record = {
    id: response.request_id,
    timestamp: new Date().toISOString(),
    request,
    channels: response.channels,
  };
  state.history.unshift(record);
  state.history = state.history.slice(0, HISTORY_LIMIT);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(state.history));
  renderHistory();
}

function loadHistory() {
  try {
    state.history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  } catch (err) {
    state.history = [];
  }
  renderHistory();
}

function renderHistory() {
  const box = document.getElementById('history-list');
  box.innerHTML = '';
  if (!state.history.length) {
    box.appendChild(el('div', 'history-empty', 'No generations yet.'));
    return;
  }
  state.history.forEach(record => {
    const item = el('div', 'history-item');
    const personaLabel = state.personas[record.request.persona]?.label || record.request.persona;
    const platformLabels = (record.request.platforms || [])
      .map(p => state.platforms[p]?.label || p)
      .join(', ');
    item.appendChild(el('div', null, `${personaLabel} → ${platformLabels}`));
    const meta = el('div', 'meta', `${record.request.problem.slice(0, 40)}${record.request.problem.length > 40 ? '…' : ''}`);
    item.appendChild(meta);
    item.addEventListener('click', () => loadHistoryRecord(record));
    box.appendChild(item);
  });
}

function loadHistoryRecord(record) {
  document.getElementById('audience-input').value = record.request.audience;
  document.getElementById('problem-input').value = record.request.problem;
  document.getElementById('tone-select').value = record.request.tone;
  setPersonaType(record.request.persona_type);
  document.getElementById('persona-select').value = record.request.persona;

  const platformSet = new Set(record.request.platforms || []);
  state.selectedPlatforms = platformSet;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', platformSet.has(p.dataset.platform));
  });

  state.selectedKb = new Set(record.request.kb_ids || []);
  renderKbSelectList();

  state.lastRequest = record.request;
  state.channels = {};
  record.channels.forEach(ch => {
    const variants = {};
    ch.variants.forEach(v => { variants[v.key] = v; });
    state.channels[ch.platform] = { analysis: ch.analysis, variants };
  });
  renderChannels();

  buildSteps(Array.from(platformSet));
  markAllStepsDone();
}

// ---------------------------------------------------------------------
// Knowledge base
// ---------------------------------------------------------------------
async function loadKB() {
  const res = await apiFetch('/kb');
  state.kb = await res.json();
  state.kb.filter(e => e.tier !== 'global').forEach(e => state.selectedKb.add(e.id));
  renderKB();
}

function renderKB() {
  ['global', 'client', 'user'].forEach(tier => {
    const list = document.getElementById(`kb-list-${tier}`);
    list.innerHTML = '';
    const entries = state.kb.filter(e => e.tier === tier);
    if (!entries.length) {
      const li = el('li', 'kb-empty', 'No entries yet.');
      list.appendChild(li);
      return;
    }
    entries.forEach(e => {
      const li = document.createElement('li');
      const item = el('div', 'kb-item');
      const heading = el('strong', null, e.title);
      heading.appendChild(el('span', 'kind-badge', KIND_LABELS[e.kind] || e.kind));
      item.appendChild(heading);
      item.appendChild(el('p', null, e.content));
      if (tier !== 'global') {
        const del = el('button', 'kb-delete', '✕');
        del.addEventListener('click', () => deleteKBEntry(e.id));
        item.appendChild(del);
      }
      li.appendChild(item);
      list.appendChild(li);
    });
  });
  renderKbSelectList();
}

function renderKbSelectList() {
  const box = document.getElementById('kb-select-list');
  box.innerHTML = '';
  const entries = state.kb.filter(e => e.tier !== 'global');
  if (!entries.length) {
    box.appendChild(el('div', 'kb-empty', 'No client/user KB docs yet — add some in the sidebar.'));
    return;
  }
  entries.forEach(e => {
    const row = el('label', 'kb-select-row');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = state.selectedKb.has(e.id);
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) state.selectedKb.add(e.id);
      else state.selectedKb.delete(e.id);
    });
    row.appendChild(checkbox);
    row.appendChild(el('span', null, e.title));
    row.appendChild(el('span', 'kind-badge', KIND_LABELS[e.kind] || e.kind));
    row.appendChild(el('span', 'tier-badge', e.tier));
    box.appendChild(row);
  });
}

async function addKBEntry(tier) {
  const kindSelect = document.getElementById(`kb-${tier}-kind`);
  const titleInput = document.getElementById(`kb-${tier}-title`);
  const contentInput = document.getElementById(`kb-${tier}-content`);
  const title = titleInput.value.trim();
  const content = contentInput.value.trim();
  if (!title || !content) return;
  const res = await apiFetch('/kb', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ tier, kind: kindSelect.value, title, content }),
  });
  if (!res.ok) { showError('Could not save KB entry.'); return; }
  const entry = await res.json();
  state.kb.push(entry);
  state.selectedKb.add(entry.id);
  titleInput.value = '';
  contentInput.value = '';
  renderKB();
}

async function uploadKBEntry(tier) {
  const kindSelect = document.getElementById(`kb-${tier}-kind`);
  const titleInput = document.getElementById(`kb-${tier}-title`);
  const fileInput = document.getElementById(`kb-${tier}-file`);
  const file = fileInput.files[0];
  if (!file) { showError('Choose a file to upload.'); return; }
  const title = titleInput.value.trim() || file.name;
  const formData = new FormData();
  formData.append('tier', tier);
  formData.append('kind', kindSelect.value);
  formData.append('title', title);
  formData.append('file', file);
  const res = await apiFetch('/kb/upload', { method: 'POST', body: formData });
  if (!res.ok) { showError('Could not upload KB file.'); return; }
  const entry = await res.json();
  state.kb.push(entry);
  state.selectedKb.add(entry.id);
  titleInput.value = '';
  fileInput.value = '';
  renderKB();
}

async function deleteKBEntry(id) {
  const res = await apiFetch(`/kb/${id}`, { method: 'DELETE' });
  if (!res.ok) { showError('Could not delete KB entry.'); return; }
  state.kb = state.kb.filter(e => e.id !== id);
  state.selectedKb.delete(id);
  renderKB();
}

init();
</script>
